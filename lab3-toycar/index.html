<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lab 3 Toy Car</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Model Toy Car Showcase</h1>
        <p>JavaScript Constructor Lab</p>
    </header>

    <main>

        <section class="car-section">

            <h2>Ferrari F50 Diecast Model</h2>

            <img 
                src="https://cdn.modeltoycars.com/products/large/ferrari-f50-red-bburago-26010-1-24-scale-diecast-model-toy-car.jpg" 
                alt="Ferrari F50 Toy Car"
                width="300"
            >

            <div class="button-group">
                <button onclick="displayCar()">Show Car Details</button>
                <button onclick="applyDiscount()">Apply 10% Discount</button>
            </div>

            <div id="carDetails"></div>

        </section>

    </main>

    <footer>
        <p>COMP JavaScript Lab 3</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
